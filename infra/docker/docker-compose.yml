# Cap container log files — the worker logs every stream event and its
# json-file log grew to 2.3 GB unbounded (found 2026-06-11). 3 × 50 MB
# per service keeps several days of history while bounding disk use.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "3"

services:

  # ── Data stores ────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    logging: *default-logging
    environment:
      POSTGRES_DB: chwatch
      POSTGRES_USER: chwatch
      POSTGRES_PASSWORD: chwatch
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      # Bind-mount to local disk so data survives container rebuilds
      - ../../data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chwatch"]
      interval: 5s
      timeout: 5s
      retries: 15
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - ../../data/redis:/data
    # maxmemory cap + volatile-lru. All our keys (arq jobs, ch:rest cache,
    # query cache) have TTLs, so volatile-lru evicts the oldest-expiring
    # ones first when we hit the cap.
    # 128 MB (was 512): at current traffic the ch:rest cache is ~47k entries
    # of bot-crawled company pages; at 512 MB the kernel swapped the cold
    # pages out and swap-in bursts stalled page loads (2026-06-11).
    # activedefrag returns free chunks to the OS as fragmentation builds —
    # without it RSS can drift to 2× the logical usage after eviction storms.
    command: >
      redis-server --appendonly yes
      --maxmemory 128mb
      --maxmemory-policy volatile-lru
      --activedefrag yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 15
    logging: *default-logging
    restart: unless-stopped

  # ── Schema migrations ───────────────────────────────────────────────────────
  # Run once manually: docker compose -f infra/docker/docker-compose.yml run --rm migrate
  # or: make db-migrate

  migrate:
    build:
      context: ../../packages/db
      dockerfile: ../../infra/docker/Dockerfile.migrate
    environment:
      DATABASE_URL_SYNC: postgresql://chwatch:chwatch@postgres:5432/chwatch
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - migrate

  # ── Application services ────────────────────────────────────────────────────

  streamer:
    build:
      context: ../../apps/streamer
    environment:
      CH_STREAM_KEY: ${CH_STREAM_KEY}
      CH_REST_KEY: ${CH_REST_KEY}
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      redis:
        condition: service_healthy
    logging: *default-logging
    restart: unless-stopped

  worker:
    build:
      context: ../../apps/worker
    environment:
      CH_REST_KEY: ${CH_REST_KEY}
      DATABASE_URL: postgresql+asyncpg://chwatch:chwatch@postgres:5432/chwatch
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      BLUESKY_HANDLE: ${BLUESKY_HANDLE:-}
      BLUESKY_APP_PASSWORD: ${BLUESKY_APP_PASSWORD:-}
      SITE_URL: ${SITE_URL:-https://companieshouse.watch}
      BRAVE_SEARCH_API_KEY: ${BRAVE_SEARCH_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging: *default-logging
    restart: unless-stopped

  llm-gateway:
    build:
      context: ../../apps/llm-gateway
    # Explicit allowlist — env_file: loaded the entire .env, leaking unrelated
    # secrets (CH_REST_KEY, CH_STREAM_KEY, BRAVE_SEARCH_API_KEY) into a
    # container that has no business with them. Per AI_POLICY, ANTHROPIC_API_KEY
    # MUST stay scoped to this gateway only.
    environment:
      DATABASE_URL: postgresql://chwatch:chwatch@postgres:5432/chwatch
      REDIS_URL: redis://redis:6379/0
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GATEWAY_API_KEY: ${GATEWAY_API_KEY}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging: *default-logging
    restart: unless-stopped

  web:
    build:
      context: ../../apps/web
    environment:
      DATABASE_URL: postgresql://chwatch:chwatch@postgres:5432/chwatch
      REDIS_URL: redis://redis:6379/1
      CH_REST_KEY: ${CH_REST_KEY}
      LLM_GATEWAY_URL: http://llm-gateway:8000
      NODE_ENV: production
      NEXT_PUBLIC_SITE_URL: ${SITE_URL:-https://ch.borsoi.co.uk}
    ports:
      - "3030:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging: *default-logging
    restart: unless-stopped

  # ── Test runner (not started by default; call via `make test`) ─────────────

  test:
    build:
      context: ../../apps/worker
    environment:
      CH_REST_KEY: ${CH_REST_KEY:-test}
      DATABASE_URL: postgresql+asyncpg://chwatch:chwatch@postgres:5432/chwatch
      REDIS_URL: redis://redis:6379/0
    command: python -m pytest tests/ -v
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - test
