name: security

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Daily at 03:30 UTC — catches new CVEs even on quiet weeks.
    - cron: "30 3 * * *"

permissions:
  contents: read
  security-events: write

jobs:
  npm-audit-web:
    name: npm audit (apps/web)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci --ignore-scripts
      # Fail the job on HIGH or CRITICAL findings. Moderate is reported but
      # doesn't block — they're often build-tooling vulns with no runtime exposure.
      - name: npm audit (high+)
        run: npm audit --audit-level=high --omit=dev
      - name: npm audit (full report, never fails)
        if: always()
        run: npm audit --json > audit.json || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: npm-audit-web
          path: apps/web/audit.json

  pip-audit-python:
    name: pip-audit (Python services)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [worker, streamer, llm-gateway]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pip-audit
      - name: pip-audit (${{ matrix.service }})
        run: |
          if [ -f apps/${{ matrix.service }}/pyproject.toml ]; then
            pip-audit -r <(python -c "
          import tomllib, sys
          with open('apps/${{ matrix.service }}/pyproject.toml', 'rb') as f:
              data = tomllib.load(f)
          for dep in data.get('project', {}).get('dependencies', []):
              print(dep)
          ") --strict
          fi
